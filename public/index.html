<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recipe guru</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="reseptiguru_logo.png" />
  </head>
  <body>
    <header class="header">
      <h1>Recipe guru</h1>
      <nav class="nav">
        <div class="nav-center">
          <a href="/">Home</a>
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
          <a href="favs.html">Favourites</a>
        </div>
        <div class="nav-user">
          <span id="userInfo"></span>
          <button id="logoutBtn">Logout</button>
        </div>
      </nav>
    </header>

    <h2>Search Recipes</h2>

    <form id="search-form" class="search-form-centered">
      <input
        type="text"
        id="searchInput"
        placeholder="Search for a recipe or ingredient..."
      />
      <select id="categorySelect">
        <option value="">All categories</option>
        <option value="Beef">Beef</option>
        <option value="Chicken">Chicken</option>
        <option value="Vegetarian">Vegetarian</option>
        <option value="Dessert">Dessert</option>
      </select>
      <button type="submit">Search</button>
    </form>

    <h2>Recipes</h2>

    <div id="recipeList" class="recipe-grid"></div>

    <footer class="footer">
      <div class="footer-container">
        <p>&copy; 2026 recipe guru. All rights reserved.</p>
      </div>
    </footer>

    <script src="./js/main.js"></script>
    <script src="./js/auth.js"></script>
  </body>
</html>
