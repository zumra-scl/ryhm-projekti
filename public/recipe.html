<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recipe detail</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="reseptiguru_logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="header">
      <h1 class="logo">Recipe guru</h1>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="favs.html">Favourites</a>

        <span id="userInfo"></span>
        <button id="logoutBtn">Logout</button>
      </nav>
    </header>

    <a href="/">← Back</a>

    <div id="recipeDetail"></div>

    <h3 id="avgRating">⭐ Loading rating...</h3>

    <div id="reviewSection">
      <h3>Rate this recipe</h3>

      <select id="rating">
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>

      <textarea id="comment" placeholder="Write your comment"></textarea>

      <button id="submitReview">Submit Review</button>
    </div>

    <div id="reviewsList"></div>

    <footer class="footer">
      <div class="footer-container">
        <p>&copy; 2026 recipe guru. All rights reserved.</p>
      </div>
    </footer>

    <script src="./js/auth.js"></script>
    <script src="./js/recipe.js"></script>
  </body>
</html>
