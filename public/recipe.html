<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recipe detail</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="reseptiguru_logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="header">
      <h1 class="logo">Recipe guru</h1>
      <nav class="nav">
        <div class="nav-center">
          <a href="/">Home</a>
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
          <a href="favs.html">Favourites</a>
        </div>
        <div class="nav-user">
          <span id="userInfo"></span>
          <button id="logoutBtn">Logout</button>
        </div>
      </nav>
    </header>

    <div class="recipe-detail-container">
      <a href="/" class="back-btn">← Back</a>
      <div id="recipeDetail" class="recipe-detail-box"></div>
      <div id="avgRating" class="rating-box">⭐ Loading rating...</div>
      <div id="reviewSection" class="review-section">
        <h3>Rate this recipe</h3>
        <div class="star-rating" id="starRating">
          <span class="star" data-value="1">&#9733;</span>
          <span class="star" data-value="2">&#9733;</span>
          <span class="star" data-value="3">&#9733;</span>
          <span class="star" data-value="4">&#9733;</span>
          <span class="star" data-value="5">&#9733;</span>
        </div>
        <input type="hidden" id="rating" value="1" />
        <textarea id="comment" placeholder="Write your comment"></textarea>
        <button id="submitReview">Submit Review</button>
      </div>
      <div id="reviewsList"></div>
    </div>

    <footer class="footer">
      <div class="footer-container">
        <p>&copy; 2026 recipe guru. All rights reserved.</p>
      </div>
    </footer>

    <script src="./js/auth.js"></script>
    <script src="./js/recipe.js"></script>
  </body>
</html>
