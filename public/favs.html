<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Favourites</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="reseptiguru_logo.png" />
  </head>

  <body>
    <header class="header">
      <h1 class="logo">Recipe guru</h1>

      <nav class="nav">
        <div class="nav-center">
          <a href="/">Home</a>
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
          <a href="favs.html">Favourites</a>
        </div>
        <div class="nav-user">
          <span id="userInfo"></span>
          <button id="logoutBtn">Logout</button>
        </div>
      </nav>
    </header>

    <main class="main">
      <h2>Your Favourite Recipes</h2>

      <div id="favourites-container" class="recipe-grid"></div>
    </main>

    <script src="./js/auth.js"></script>

    <script>
      const container = document.getElementById("favourites-container");

      function getUser() {
        return JSON.parse(localStorage.getItem("user"));
      }

      function getFavKey() {
        const user = getUser();
        return `favs_${user?.id || "guest"}`;
      }

      function loadFavs() {
        const key = getFavKey();

        const favs = JSON.parse(localStorage.getItem(key)) || [];

        container.innerHTML = "";

        if (favs.length === 0) {
          container.innerHTML = "<p>No favourites yet</p>";
          return;
        }

        favs.forEach((f) => {
          container.innerHTML += `
            <div class="card">
              <img src="${f.img}" alt="${f.name}" />

              <h3>${f.name}</h3>

              <div class="button-row">
                <a class="button" href="recipe.html?id=${f.id}">
                  View
                </a>
                <button class="button" onclick="removeFav('${f.id}')">
                  Remove
                </button>
              </div>
            </div>
          `;
        });
      }

      function removeFav(id) {
        const key = getFavKey();

        let favs = JSON.parse(localStorage.getItem(key)) || [];

        favs = favs.filter((f) => f.id !== id);

        localStorage.setItem(key, JSON.stringify(favs));

        loadFavs();
      }

      loadFavs();
    </script>
  </body>
</html>
