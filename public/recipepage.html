<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>recipe</title>
  </head>
  <body>
    <header>
      <h1 id="site-title">recipe guru</h1>
    </header>

    <main>
      <section>
        <h1 id="recipe-title"></h1>
        <img id="recipe-image" src="" alt="" />
      </section>

      <section>
        <h2>Ingredients</h2>
        <ul id="ingredients-list"></ul>
      </section>

      <section>
        <h2>Instructions</h2>
        <p id="instructions-text"></p>
      </section>

      <section>
        <a id="source-link" href="" target="_blank">recipe</a>
      </section>

      <section>
        <h2>ratings</h2>
        <p>abcdef <span id="average-rating"></span>/5</p>
        <div id="reviews-container"></div>
      </section>

      <section>
        <h3>add a review</h3>
        <form id="review-form">
          <label>stars ⭐ </label>
          <select id="rating">
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>

          <label>comment</label>
          <textarea id="comment"></textarea>

          <button type="submit">submit</button>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 recipe guru. all rights reserved.</p>
    </footer>
  </body>
</html>
